[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_CONVEX_URL = "https://rosy-crow-160.convex.cloud"
  VITE_CONVEX_SITE_URL = "https://rosy-crow-160.convex.site"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
