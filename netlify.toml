[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_CONVEX_URL = "https://rosy-crow-160.convex.cloud"
  VITE_CONVEX_SITE_URL = "https://rosy-crow-160.convex.site"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"

# ── Redirects ────────────────────────────────────────────────────────────────
# Static XML / txt files — must be served BEFORE the catch-all SSR function
# so Googlebot can fetch them directly as plain files.
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap.xml"
  status = 200
  force  = false

[[redirects]]
  from   = "/robots.txt"
  to     = "/robots.txt"
  status = 200
  force  = false

# WWW → non-www canonical redirect
[[redirects]]
  from = "https://www.adsdotcom.net/*"
  to   = "https://adsdotcom.net/:splat"
  status = 301
  force  = true

# Old anchor-based service URLs → dedicated pages (301)
[[redirects]]
  from   = "/services#outdoor"
  to     = "/services/outdoor-advertising"
  status = 301

[[redirects]]
  from   = "/services#outdoor-advertising"
  to     = "/services/outdoor-advertising"
  status = 301

[[redirects]]
  from   = "/services#printing"
  to     = "/services/printing"
  status = 301

[[redirects]]
  from   = "/services#fabrication"
  to     = "/services/fabrication"
  status = 301

[[redirects]]
  from   = "/services#installation"
  to     = "/services/installation"
  status = 301

[[redirects]]
  from   = "/services#events"
  to     = "/services/events"
  status = 301

[[redirects]]
  from   = "/services#creative"
  to     = "/services/creative-design"
  status = 301

[[redirects]]
  from   = "/services#creative-design"
  to     = "/services/creative-design"
  status = 301

# Hide admin route
[[redirects]]
  from   = "/admin"
  to     = "/"
  status = 301

# ── Headers ──────────────────────────────────────────────────────────────────
# Immutable cache for hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts aggressively
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML (SSR pages)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static files in public — moderate cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type  = "application/xml; charset=UTF-8"
    X-Robots-Tag  = "noindex"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=UTF-8"

# Security + performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
